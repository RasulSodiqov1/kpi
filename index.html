  <style>

    body {
      margin: 0;

      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #0a0a0a 40%, #000000 100%);
      overflow: auto;
    }
    body::before, body::after {
      content: "";
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      z-index: 0;
      pointer-events: none;
    }
    body::before {
      background: radial-gradient(circle, rgba(255,0,0,0.28) 0%, transparent 70%);
      animation: redPulse 5s infinite ease-in-out;
    }
    body::after {
      background: radial-gradient(circle, rgba(0,0,255,0.28) 0%, transparent 70%);
      animation: bluePulse 7s infinite ease-in-out;
    }
    @keyframes redPulse { 0%,100% {opacity:0; transform:scale(1);} 50% {opacity:1; transform:scale(1.2);} }
    @keyframes bluePulse { 0%,100% {opacity:0; transform:scale(1);} 50% {opacity:1; transform:scale(1.3);} }

    .container {
      position: relative;
      z-index: 2;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 28px;
      width: 640px;
      max-width: 94vw;
      color: #fff;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    img.logo {
      width: 180px;

      margin-bottom: 12px;
      display: block;
      margin-left: auto; margin-right: auto;
      animation: fadeIn 700ms ease;
      user-select: none;
    }
    @keyframes fadeIn { from {opacity:0; transform:translateY(-6px);} to {opacity:1; transform:translateY(0);} }

    input, .select-selected {
      width: 100%;
      padding: 12px 14px;
      margin: 10px -15px;
      border-radius: 12px;
      border: none;
      outline: none;
      color: #fff;
      background: var(--glass-2);
      backdrop-filter: blur(8px);
    }
    input::placeholder { color: #e8e8e8; opacity: .9; }

    .btn {
      width: 100%;
      background: linear-gradient(45deg, var(--accent), #ff4d00);
      border: none;
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 16px;
      color: #fff;
      cursor: pointer;
      margin-top: 14px;
      transition: transform .25s ease, box-shadow .25s ease, filter .25s ease;
      will-change: transform;
    }
    .btn:hover { transform: scale(1.04); box-shadow: 0 0 22px rgba(255,120,0,.85); filter: saturate(1.1); }

  function shuffle(array){
    const a = array.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }
  function saveState(){
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e){}
  }
  function loadState(){
    try {
      const raw = localStorage.getItem(LS_KEY);
      if(!raw) return false;
      const saved = JSON.parse(raw);
      if(!saved || !Array.isArray(saved.shuffled)) return false;
      state = Object.assign(state, saved);
      return true;
    } catch(e){ return false; }
  }
  function clearState(){ try{ localStorage.removeItem(LS_KEY); }catch(e){} }

    const op = document.getElementById('operatorId').value.trim();
    if(!fio || !op){ alert('Введите все данные'); return; }

    state.fio = fio;
    state.operatorId = op;
    state.current = 0;
    state.time = 50*60;
    state.results = [];
    state.selectedAnswer = "";
    state.shuffled = shuffle(questions);
    saveState();

    document.getElementById('welcomeScreen').style.display='none';
    document.getElementById('quizScreen').style.display='block';
    loadQuestion(true);
    startTimer();
  }

  let timerInterval;
  function startTimer(){
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      state.time--;
      const m = Math.floor(state.time/60);
      const s = state.time%60;
      document.getElementById('timer').innerText = `Қолган вақт: ${m}:${s<10?'0':''}${s}`;
      if(state.time<=0){ clearInterval(timerInterval); showResults(); }
      saveState();
    }, 1000);
  }

  function resumeAfterLoad(){
    loadQuestion(true);
    updateProgress();
    const m = Math.floor(state.time/60); const s = state.time%60;
    document.getElementById('timer').innerText = `Қолган вақт: ${m}:${s<10?'0':''}${s}`;
  }

  // ====== ОТРИСОВКА ВОПРОСА ======
  function loadQuestion(animate=false){
    if(state.current >= state.shuffled.length){ showResults(); return; }
    const qObj = state.shuffled[state.current];
    const qText = document.getElementById('questionText');
    const wrap = document.getElementById('questionWrap');

    if(animate){ wrap.classList.remove('enter'); void wrap.offsetWidth; }
    qText.innerText = qObj.q;
    document.querySelector('.select-selected').innerText = 'Жавобни танланг...';
    document.getElementById('dropdownSearch').value='';
    state.selectedAnswer = '';

    const cont = document.getElementById('optionsContainer');
    cont.innerHTML='';
    answers.forEach(ans => {
      const d = document.createElement('div');
      d.className='opt';
      d.textContent=ans;
      d.onclick = () => { document.querySelector('.select-selected').innerText = ans; state.selectedAnswer = ans; toggleDropdown(true); };
      cont.appendChild(d);
    });

    updateProgress();
    if(animate){ requestAnimationFrame(()=> wrap.classList.add('enter')); }
    saveState();
  }

  function updateProgress(){
    const p = (state.current / Math.max(1, state.shuffled.length)) * 100;
    document.getElementById('progressBar').style.width = p + '%';
  }

  function toggleDropdown(forceClose){
    const box = document.querySelector('.select-items');
    if(forceClose){ box.classList.add('hidden'); return; }
    box.classList.toggle('hidden');
    if(!box.classList.contains('hidden')){ document.getElementById('dropdownSearch').focus(); }
  }

  function filterDropdown(){
    const search = document.getElementById('dropdownSearch').value.toLowerCase();
    const opts = document.getElementById('optionsContainer').querySelectorAll('.opt');
    opts.forEach(o => { o.style.display = o.textContent.toLowerCase().includes(search) ? '' : 'none'; });
  }

  function nextQuestion(){
    if(!state.selectedAnswer){ alert('Жавобни танланг'); return; }
    const qObj = state.shuffled[state.current];
    state.results.push({ q: qObj.q, correct: qObj.a, chosen: state.selectedAnswer });
    state.current++;
    saveState();
    const wrap = document.getElementById('questionWrap');
    wrap.classList.remove('enter');
    setTimeout(()=> loadQuestion(true), 70);
  }

  // ====== ИТОГ (+ отправка в Telegram) ======
async function showResults(){
  clearInterval(timerInterval);
  document.getElementById('quizScreen').style.display='none';
  const resDiv = document.getElementById('resultScreen');
  resDiv.style.display='block';

  const total = state.results.length || state.shuffled.length;
  const correctCount = state.results.filter(r => r.correct === r.chosen).length;
  const timeSpent = (50*60 - state.time);
  const mm = Math.max(0, Math.floor(timeSpent/60));
  const ss = Math.max(0, timeSpent%60);

  // === новое: считаем процент ===
  const percent = Math.round((correctCount / total) * 100);

  // Рендер на странице
  resDiv.innerHTML = `
    <h2>Натижа</h2>
    <p>Тўғри жавоб: ${correctCount} / ${total}</p>
    <p>Балл: ${percent}</p>
  `;
  state.results.forEach(r => {
    if(r.correct !== r.chosen){
      resDiv.innerHTML += `<div class='result'><b>${r.q}</b><br>Ваш ответ: ${r.chosen || '—'}<br>Правильный ответ: ${r.correct}</div>`;
    }
  });

  // Подготовка текста для Telegram
  const header =
`✅ Тест 112 завершён
Дата/время: ${new Date().toLocaleString()}
👤 ФИО: ${state.fio}
🆔 Оператор: ${state.operatorId}
⏱ Время: ${mm}:${ss<10?'0':''}${ss}
📊 Итог: ${correctCount} / ${total} (${percent}%)`;

  let wrongList = "";
  state.results.forEach((r, i) => {
    if(r.correct !== r.chosen){
      wrongList += `\n\n${i+1}) ${r.q}\n— Ваш ответ: ${r.chosen || '—'}\n— Верный: ${r.correct}`;
    }
  });

  const message = header + (wrongList ? `\n\n❌ Ошибки:${wrongList}` : `\n\n🎉 Без ошибок!`);

  await sendLongToTelegram(message);
  clearState();
  }
  </script>
</body>
</html>
